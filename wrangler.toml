name = "mini-calendly"
main = "src/worker.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "mini-calendly-db"
database_id = ""

[vars]
ADMIN_USER = ""
ADMIN_PASS = ""
# Get token from https://meeting.tencent.com/ai-skill
TENCENT_MEETING_TOKEN = ""
# Google Meet: create OAuth2 credentials at https://console.cloud.google.com/apis/credentials
# Enable Google Calendar API, then get refresh_token via OAuth2 playground
GOOGLE_CLIENT_ID = ""
GOOGLE_CLIENT_SECRET = ""
GOOGLE_REFRESH_TOKEN = ""
